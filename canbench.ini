# canbench vehicle profiles.
#
# The GUI (tools/can_gui.py) and profiles.load_profiles() read this file if it
# sits next to the app (or the exe once packaged). Delete it to fall back to the
# built-in Vtrux/Coda defaults. Point at a different file with:  can_gui.py --ini PATH
#
# log_dir may be relative (resolved against the app/exe folder) or absolute.
# bitrate is in bits/second.

[general]
default_profile = vtrux

[profile:vtrux]
log_dir = VtruxLogs
bitrate = 500000
description = Via/VTRUX hybrid truck

[profile:coda]
log_dir = CodaLogs
bitrate = 500000
description = Coda Sedan EV
